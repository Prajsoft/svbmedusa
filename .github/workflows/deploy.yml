name: Deploy Medusa

on:
  push:
    branches:
      - main
    paths:
      - 'svb-medusa/**'

jobs:
  test:
    name: Medusa unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: svb-medusa

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: svb-medusa/yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run unit tests
        run: yarn test:unit

  deploy:
    name: Deploy to Hetzner
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/svbmedusa/svb-medusa
            git fetch origin
            git merge origin/main --no-edit
            yarn install
            yarn build
            pm2 restart medusa
